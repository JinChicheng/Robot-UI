<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta
        name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>Robot Face</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="face-shell">
        <section class="face-stage">
            <div id="face-root" class="robot-frame" aria-label="Robot face">
                <div id="robotCanvasFace" class="robot-canvas-face emotion-calm state-calm">
                    <div id="glowHalo" class="glow-halo" aria-hidden="true"></div>
                    <div id="thinkingDots" class="thinking-dots" aria-hidden="true">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <div id="speakingBars" class="speaking-bars" aria-hidden="true">
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <img id="emotionImageA" class="emotion-image is-active" alt="Robot emotion">
                    <img id="emotionImageB" class="emotion-image" alt="">
                </div>
            </div>
            <div id="status" class="status" hidden></div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
